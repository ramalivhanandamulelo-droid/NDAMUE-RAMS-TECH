<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMX Live Tracker</title>

<style>
body{
background:#050816;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#0d1224;
padding:40px;
border-radius:30px;
width:90%;
max-width:500px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
}

button{
background:#2563eb;
color:white;
border:none;
padding:16px 30px;
border-radius:16px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

.location-box{
margin-top:30px;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:20px;
}

p{
color:#9ca3af;
line-height:1.8;
}

h1{
font-size:40px;
margin-bottom:15px;
}

.coords{
margin-top:15px;
font-size:18px;
color:white;
}

a{
display:inline-block;
margin-top:20px;
color:#60a5fa;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>RAMX</h1>

<p>
Live GPS phone tracking for family safety.
Press the button below to allow location access.
</p>

<button onclick="startTracking()">
Start Live Tracking
</button>

<div class="location-box">

<h2>Live Location</h2>

<div class="coords" id="coords">
Waiting for GPS...
</div>

<a id="mapLink" target="_blank"></a>

</div>

</div>

<script>

function startTracking(){

if(!navigator.geolocation){

alert("Geolocation is not supported");

return;

}

navigator.geolocation.watchPosition(

(position)=>{

const lat = position.coords.latitude;
const lon = position.coords.longitude;

document.getElementById("coords").innerHTML = `
Latitude: ${lat}<br>
Longitude: ${lon}
`;

const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;

const mapLink = document.getElementById("mapLink");

mapLink.href = mapsUrl;

mapLink.innerHTML = "Open Live Location In Google Maps";

},

(error)=>{

alert("Location access denied.");

},

{
enableHighAccuracy:true,
maximumAge:0,
timeout:5000
}

);

}

</script>

</body>
</html>
